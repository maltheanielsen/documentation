<html>
  <head>
    <title>Documentation</title>
  </head>
  <body>
    <script>
      //Create a variable
      var x = 5;
      
      //Check if variable is less than 10
      if(x < 10){
        //Output if x < 10
        alert(x + " is less than 10");
      }
      else{
        //Output if x is not less than 5
        alert(x + " is not less than 10");
      }
    </script>
  </body>
</html>
